  - {type: variant, offset: 5443, length: 128, content: '唐僧祥公。不知其氏族。博聞達識之人。而記法華之應驗。誘愚昧之徒。殊載出傳譯等之科目。該括一化之始終。實維甚奇甚妙也。故盛行于世。為談者之資矣。然轉寫誤於豕亥𠝶有差脫。不可稱計。予甞披僧史傳并眾經錄等。忽覺此記傳之有本據。愈考愈質。輒命工鏤梓。學者幸勿疑惑焉。時

      慶長庚子載季春望日　洛陽　釋圓智誌', 甲: 大治五年四月十四日出窓事一校了}
