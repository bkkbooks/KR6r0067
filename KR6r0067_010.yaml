body:
  text: 依正供養第十二附出法供養釋慧紹一釋慧益二釋法光三釋大志四釋會通五比丘尼六書生七釋僧瑜八十種供九供養益十妙華天十一寶瓔天十二老女十三優婆塞十四釋僧達十五法供養十六無行比丘十七宋臨川招提寺釋慧紹一釋慧紹不知氏族小兒時母哺魚肉輒吐咽菜不疑於是便蔬食至八歲出家為僧後隨要止臨川招提寺誦法華經每至藥王品乃密有燒身之志常雇人斫薪積於東山石室數丈中央開一龕足容己身乃還寺辭要於燒身之日於東山設大會告別知識其口闔境奔波車馬人衆及齎金寶者不可稱計至夜初更行道誦經紹自行香竟執燭燃薪入中而坐誦藥王本事品衆既不見紹悟其已去禮拜未畢悉至蘇已洞燃誦經聲未息火至額聞唱一心言已奄絶大衆咸見有一星其大如斗直下烟中俄而上天時見者咸謂天宮迎紹經三日薪聚乃盡前臨終時謂同行曰吾燒身處當生梧桐慎莫伐之燒身三日果生矣宋京師竹林寺釋慧益二釋慧益廣陵人也少出家隨師止壽春宋孝建中出都憩竹林寺精勤苦行誦通法華每至藥王品流淚歎曰人身難受佛教難遇得好欲燒身衆人聞者毀讚交語大明四年始斷粒唯餌麻麥到六年更斷麥等但食蘇油又絶蘇油唯服香丸雖四大綿微而神情警正孝武深加敬異致問殷勤遣太宰江夏王義恭詣寺諫益益誓志無改至大明七年四月八日將就焚燒乃於鍾山之南置鑊辦油其日朝乘牛車而以人牽自寺之山以帝王是兆民所憑又三寶所寄乃自力入臺至雲龍門不能步下令人啓聞慧益道人今捨身詣門奉辭深以佛法仰纍帝聞改容即躬出雲龍門益既見帝重以佛法憑囑於是辭去帝亦續至諸王妃后道俗士庶填滿山谷投衣棄寶不可勝計益入鑊據一小床以衣具自纏上加一長帽以油灌之將就著火帝令太宰至鑊所請諭曰道行多方何必殞命幸願三思更就異途益雅志確然曾無悔念乃答曰微軀賤命何足上留天心聖慈罔已者願度二十人出家降敕即許益乃手自執燭以燃帽帽燃乃棄燭合掌誦藥王品火至眉誦聲猶分明及眼乃昧貴賤哀嗟響振幽谷莫不彈指稱佛惆悵淚下火至明旦乃盡帝於時聞空中笳管異香芬苾帝盡日方還官夜夢見益振錫而至更囑以佛法明日帝為設會度人令齊主唱白具序徵祥燒身之處謂藥王寺以擬本事也齊隴西釋法光三釋法光秦州隴西人少而有信至二十九方出家苦行頭陀不服綿纊絶五穀唯餌松葉後誓志燒身欲供養法乃服松膏及飲油經于半年至齊永明五年十月二十日於隴西記城寺內集薪焚身以滿先志火來至目誦法華經聲猶記至鼻乃昧奄然春秋四十有一已上三緣梁高僧傳十二隋九江廬山沙門釋大志四釋大志姓顧氏會稽山陰人發蒙出家師事天台智者顗覩其形神灑落高放物表因名為大志禪誦為業苦節自專四方名所無遠必造而言氣清穆儀相真嚴故見者䀎睞知非凡器開皇十年來遊廬嶽住峯頂寺不隸公名不豫僧伍誦法華經索然間雅絶能清囀使諸聽者忘疲後於華山甘露峯南建靜觀道場頭陀為業子爾一身不避虓虎聞有惡狩輒往投之皆避而不噉山粒本絶終日忘餐或以餅果繼命而已外覩不堪其惱而志安之容色如故經于七載禪業無斷晚住此山福林寺會大業屏除流徒隱逸慨法陵遲一至於此乃變服毀形頭擐孝服麁布為衣在佛堂中高聲慟哭三日三夕初不斷絶寺僧慰喻志曰余歎惡業乃如此耶要盡此形骸伸明正教耳遂往東都上表曰願陛下興顯三寶當然一臂於嵩嶽用報國恩帝許之敕設大齊七衆通集志不食三日登大棚上燒鐵赫然用烙其臂並令焦黑以刀截斷肉裂骨現又烙其骨令焦黑已布裹蠟灌下火然之光耀巖岫于時大衆見其行苦皆痛心貫髓不安其足而志雖加燒烙詞色不變言笑如初時誦法句或歎佛德為衆說法聲聲不絶臂燒既盡如先下棚七日入定跏坐而卒時年四十有三矣唐終南豹林谷釋會通五釋會通雍州萬年御宿川人少欣道撿遊泊林泉苦節戒行是其顧習投終南豹林谷潛隱綜業讀法華經至藥王品便欣厭捨私集柴木誓必行之以貞觀末年靜夜林中積薪為窟誦至藥王便令下火風驚焰發煙火俱盛卓爾跏坐聲誦如故尋爾西南有大白光流入火聚身方偃仆至曉身火俱滅乃收其遺骨為起白塔勒銘存焉荊州比丘尼六貞觀之初荊州有比丘尼姊妹同誦法華深厭形器俱欲捨身節約衣食欽崇苦行服諸香油漸斷粒食後頓絶穀推噉香蜜精力所被神志鮮爽周告道俗剋日燒身以貞觀三年二月八日於荊州大街置二高座乃以蠟布纏身至頂惟出面目衆聚如山歌讚雲會誦至燒處其姊先以火柱妹頂請妹又以火柱姊頂清夜兩炬一時同耀焰下至眼聲相轉明漸下鼻口方乃歇滅恰至明晨合坐洞舉一時火化骸骨摧朽二舌俱存合衆欣嗟為起高塔并州城西書生七并州城西有一書生年二十四五誦法華經誓燒供養乃集數束蒿乾籠之人問其故密而不述後於中夜放火自燒及人往救火盛已死乃就加柴薪盡其形陰宋廬山招提寺釋僧瑜八釋僧瑜姓周吳興餘抗人弱冠出家業素純粹元嘉十五年與同學曇溫慧光等於廬山南嶺共建精舍名曰招隱瑜常以為結纍三塗情形故也情將盡矣形亦宜損藥王之𨅊獨何云遠於是屢發言誓始契燒身以宋孝建二年六月三日集薪為龕并請僧設齊告衆辭別是日雲霧晦合密雨交零瑜乃誓曰若我所志克明天當清朗如其無感便當滂注使此四輩知神應之無昧也言已雲景明霽至初夜竟便入薪龕中合掌平坐藥藥王品火焰交至猶合掌不散道俗知者奔赴彌山並稽首作禮願結因緣咸身紫氣騰空久之乃歇時年四十四其後旬有四日瑜房中生雙梧桐根枝豐茂巨細相如貫壤直聳遂成奇樹理識者以為娑羅寶樹剋炳泥洹瑜之庶幾故現斯證因號為雙桐沙門吳郡張辨為平南長吏親覩其事具為傳贊贊曰悠悠玄機茫茫至道出生入死孰為妙寶其一自昔藥王殊化絶倫往聞其說今覩斯人其二英英沙門慧定心固凝神紫氣表迹雙樹其三其德可樂其操可貴文之作矣式飄鬘佛其四十種供養記九逍遙園記云外國法師鳩摩羅什弘始七年冬譯新法華竟一部七卷二十八品明年春正月本齊挍定造金字經七寶以為莊嚴光色映園道俗如市瞻仰禮拜感夢云闕一塵一劫四字更勘梵本如所夢秦王歡喜曰什師深得經旨良會聖心先所寫者闕此四字尋經綴之王謂什云朕如法供養經卷法式何等什曰若欲如說供養經卷須依經說略備十種供具一華二香三瓔珞四抹香五塗香六燒香七幡蓋八衣服九妓樂十合掌也王曰未審何等香華什曰香者海岸香麝香鬱金香蘇合香等用淨潔香去不淨香非抹為微塵類華者水陸時華如蓮華等類若無時華以七寶成擬曼陀羅等四華及時妙華外國用優鉢羅華蘇摩那華等瓔珞者用珠寶成擬如意珠瓔珞摩尼珠瓔珞等外國用一百雜寶瓔珞抹香者抹檀木根莖等若和水以為塗香擬沈水等若合火為燒香擬薰幡蓋者用淨潔疊外國用藕糸等絶服擬天妙衣妓樂者用鼓簫笛琴箜篌等合掌者以敬心為供用蓮華合掌皆用淨潔寄事悟理王曰其果報一何什曰果報有遠近近依局情不關善體遠得常住佛果王曰其局情近果及遠妙果一何什曰如此供養果報微妙諸佛所歎且昔佛在世時有旃檀香口比丘九十一劫在人中天上身諸毛孔出旃檀香口中常出優鉢羅華香最後值佛得阿羅漢三明六通具八解脫此毗婆尸佛滅後以香供塔所得果報迦毗羅城一百童子昔同在一邑作伎樂持香華供養佛塔九十一劫不墮惡道同受快樂值佛盡苦華天昔以野澤草華用散衆僧所生之處常雨天華威德比丘以萎華散塔上亦復如是外國有一婆羅門造三逆殺父母阿羅漢也後生悔心以香華供養經卷罪垢微薄以餘業故雖墮地獄猛火如溫水目謂溫泉入中快樂身有異香罪人聞之得生天上善化王以幡蓋覆支佛廟感輪王業華蓋比丘以草蓋覆塔九十一劫華蓋覆護其身妙音以伎樂供佛乃至過去諸佛皆成佛道初發心時一華一香等以供養佛如賢劫千佛中執華如來從悅意佛初發心時以好衣名香貢上其佛自致正覺善思如來從普觀佛初發道心採一蓮華貢上彼佛自致正覺賢重如來從大清喜佛奉上雜香自致正覺間靜如來從無上佛初發心時奉上瓔珞自致正覺如此遠近所得果報不可稱記何況於法華而為供養以佛智慧不得其功德邊王聞此說心開意解調供具嚴淨道路散華灑水王臣大衆懸列大道金匣收經安置案上王自頂戴三千比丘唱讚前遵安詳修行入於大寺以十種供而供養之衆星來下乘雲在空見者蓋多五色雲蓋靉靆垂覆逍遙園上見未曾有于時白月十五日入夜秦王后妃王母婇女並在翻經館傍淨室中王自夢逍遙園地如廣博嚴淨土文殊在高開題目菩薩大衆從九方來所設供具遍於九方以事啓什什曰此是陛下信所致法華大教緣在茲國滅後之中此感難有明日各散什歎曰於閻浮提第三佛事矣記文煩廣之取意而出耳滅度受持供養經卷者彌勒出世時得益十法住記云彌勒如來成正覺已為聲聞衆三會說法令出生死得證涅槃乃至若諸國王及以臣度一切施於今釋迦牟尼佛正法中能為法事自種善根或教他種謂於大乘素呾覽藏所有甚深空性相應諸大乘經謂般若波羅蜜多經妙芬陀利經金光明經等如是等大乘經有百俱胝部黨差別大乘毗奈耶聲聞三藏於如是等正法藏中或是佛說或菩薩說或聲聞說或諸天說或智者說能引義利乃至有能於四句頌若自讀若教他讀若自持若教他持若自解說若教他解說或於法師恭敬供養或於經卷恭敬供養謂以種種香華幡蓋伎樂燈明而為供養或於經卷以諸雜綵囊皅縷帶而嚴飾之由如是等善根力故至彌勒如來成正覺時善得人身於彼佛第二會中以淨信心捨離家法出趣非家淨除鬚髮披著法服既預聖衆隨宿願力便得涅槃是名第二為法事故種善根者所得果報法雲經彼記大同此文外國妙華天女十一昔外國有鐵塔高丈餘於中安置芬陀利迦阿差摩摩訶毗盧舍那經等梵夾各有百千偈時有一天女夜時時來以天曼陀羅華供養鐵塔有一客遊比丘止宿塔影夜分見天女問曰汝是誰答我是忉利天妙華天女釋提桓因侍女也比丘復問有何因緣來至供養天女曰我昔為貧女乞丐自活傍有池號曰妙池夏月四色蓮華彌滿於中而生諸國婆羅門等競來採華設蓮華法會爾時貧女發微信採二莖白蓮華供養塔中芬陀利迦等修多羅乘此一善生忉利天為帝釋侍女以依本緣號曰妙華欲報法恩時時供養作是語已隱而不現沙門捨衣鉢買華供養塔及經卷出要集忉利天寶瓔天子十二昔梁武帝造五百袈裟欲施須彌山頂五百阿羅漢謂志公公往忉利天上施武帝袈裟時有一天子名曰寶瓔身所著瓔珞過天王百千萬倍光明映蔽餘天志公問曰汝衣瓔殊特何因天答曰我昔生在閻浮提華氏國為長者子以身所著衣服瓔珞供養妙法以是因緣生此天中衣瓔超過天王百千萬倍又有天子名妙雲形色端正百千天女而圍繞之志公問因即答我昔在摩竭陀國畢波羅邑以華供養妙法得此天報如此百千威德天皆由供養妙法果報志公還來具作是說長安縣老女十三長安縣有一老女不知姓名此女盲聾瘖啞為人輕賤時於大寺講新法華玄孫牽手向大寺女雖到大寺以盲聾故不見不聞玄孫執老女二手而合向講肆方女內心存念合掌而禮後經三月忽暴卒玄孫欲行葬老女尚暖至夜三更發聲呼玄孫聞者謂妖鬼生大恐敢不應至明日見起居兩眼俱明語如常人流淚悲起玄孫問誰鬼魅答曰吾非妖鬼初死之時見冥官驅向王所王從座下合掌向妾汝大功德人以合掌供養法華經業障消盡諸根復本尚有餘命早還人間示法華功力即出少路神入本身眼耳平復能言如此經半日已飲食如例女與玄孫往詣大寺說其因緣見者感喜女捨居處以供養經不知卒時出園記江寧縣優婆塞十四江寧縣有優婆塞能信小乘俱舍等說不肯大乘一時縣主道俗諸衆造金字法華經營供養士女蠢蠢輕財重法時小乘優婆塞不意助熏香器更七年後無病頓亡家人怪異不營殯葬明日日西得活悲泣躄地悶絶蘇起謂家室曰吾初死時先見大城如金城其中有衆多殿堂莊嚴奇妙金銀偉帳琉璃白疊甚可愛城外白屋相接城中童子出謂吾汝是小乘人不可入大城中可住外白屋城中唯有大乘人而居時瞻望城中宮殿多無居人問童子何宮殿無居人答曰江寧縣供養大乘諸人當生彼宮殿彼等猶在人間是故無人爾時吾憶知昔施熏香器謂童子曰吾亦供養法華豈居白屋童子曰我亦知之助薰香器故近金城非直供養故不可入城若欲入城早還人間供養妙法若供養經卷者必生此處即拜辭將還踟蹰問童子君誰此何處童子曰我是文殊師利此處金色世界汝以小心故見小城若大人見廣博妙土說此言已城及童子忽然不見覺悟如夢更發心傾家業造金字經修如法供養時人皆謂造金字經必生金色世界矣隋天台山瀑布寺釋僧達十五釋僧達姓羌台州人也小出家斷食節苦讀誦法華經隋義寧中發願寫法華經未供養之宿病忽發暴死作宿作業至炎魔廳王見僧達來從座而起前來迎之共入廳正殿坐竟方語阿師依宿作業來至吾所然寫法華經猶未供養早還人間又赦宿作業當生淨土聞王語已默然而出入本身活遂莊嚴卷軸供養經卷不知去處出寺記法供養勝十六往昔久遠難稱限爾時有佛號藥王如來世界名大清劫曰淨除藥王如來壽二十中劫諸聲聞衆三十六億菩薩大士有十二億時轉輪聖王名曰寶蓋典主四域王有千子其王供養藥王如來具五中劫與眷屬俱一切施安奉敬藥王過五中劫已告其千子吾以供侍如來君等亦當順遵前儲於時千子聞父王教復以五劫供養藥王如來進以上妙不違所安彼第一太子名曰善蓋間居獨處靜然思念我等今者供養如來寧有殊超彼者乎承佛威神虛空有天而語之曰族姓子豈欲知耶有法供養最尊無極又問曰何謂法之供養天曰爾當往問藥王如來普當為君分別說之善蓋即起詣藥王如來所稽首于地白藥王如來曰法之供養奉順典者為何儲乎世尊告曰法供養者順如來所說經典開化一切是為法之供養王子善蓋從藥王佛聞法供養應時逮得柔順法忍出家修道得五神通欲知時王寶蓋豈異人乎今見在佛寶㷿如來是也其王千子此仁賢劫中千佛興者是太子善蓋今我子釋迦牟尼是也是故當知一切所供無過法供養去來今佛皆從是出欲得供養十方諸佛即當受正法華經持諷誦讀宣示一切分別一乘無有三道頌曰假使有人欲供養者當受持此正法華經出正法華經焉又如華手偈云若以華塗香衣服及湯藥以此供養佛不名為真供如來坐道場所得微妙法若能修行者是為真供養應知供養法華為最供養而已無行比丘十七昔外國有一比丘名無行恆修法供養所謂佛所說薩達磨芬陀利迦修多羅等一切世間難信難解難受難見能信能解受持讀誦以方便力為諸衆生分別解說顯示分明守護法藏是名法之供養能修此供養時十方諸佛如星而見異口同聲而說偈言寶滿三千大千界供養十方諸如來不如法華一句偈受持讀誦得成佛假使遍滿大千界斷一切善毛道生若聞法華一句偈功德薰心速成佛無行比丘聞佛說偈深入無生法忍是為法供養益出覺禪師記上來已依西域傳記此土賢聖見聞撰集梗概而記其中或有相傳無文或見親聞自新録之雖恐本記虛實意在勸後信矣已依舊記及口傳現見親聞略撰集麁言細語歸中道見聞俱證無生忍唐僧祥公不知其氏族博聞達識之人而記法華之應驗誘愚昧之徒殊載出傳譯等之科目該括一化之始終實維甚奇甚妙也故盛行于世為談者之資矣然轉寫誤於豕亥𠝶有差脫不可稱計豫嘗披僧史傳并衆經録等忽覺此記傳之有本據愈考愈質輒命工鏤梓學者幸勿疑惑焉時慶長庚子載季春望日洛陽釋圓智志
