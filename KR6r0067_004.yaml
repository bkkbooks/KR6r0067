body:
  text: 諷誦勝利第八之二釋曇邃一竺法純二釋僧生三釋法宗四釋道五釋慧慶六釋普明七釋法莊八釋慧果九釋慧進十釋弘明十一釋慧豫十二釋超辨十三釋法慧十四釋僧侯十五釋志湛十六五侯僧十七僧法常十八并州舌十九釋慧超二十釋慧顯二十一釋善慧二十二釋慧達二十三釋法誠二十四釋慧銓二十五曇無竭二十六釋法緒二十七釋僧翼二十八釋智聰二十九釋智嶷三十晉阿陰白馬寺釋曇邃一釋曇邃未詳何許人少出家止阿陰白馬寺蔬食布衣誦法華經常一日一遍又精達經旨亦為人解說嘗於夜中忽聞扣戶云欲請法師九旬說法邃不許固請乃赴之而猶是眠中比覺已身在白馬塢神祠中并一弟子自爾日日密往餘無知者後寺僧經祠前過見有兩高座邃在北弟子在南如有諷誦講說聲又聞有奇香之氣於是道俗共傳咸云神異至夏竟神施以白馬一匹白羊五頭絹九十匹呪願畢於是各絶邃後不知所終高僧傳第十二云誦正法華以同本故靈異並同既勘其文焉晉山陰顯義寺竺法純二異名惠昂竺法純不詳何許人少出家止山陰顯義寺苦行有德善誦法華觀音品古維摩經晉元興中為寺上蘭渚買故屋暮還於湖中遇暴風而船小純唯一心憑觀世音口誦普門品不輟俄見一大流船乘之獲免至岸訪船無主須臾不見道俗咸歎神感後不知所終矣晉蜀三賢寺釋僧生三釋僧生姓袁蜀郡陴人也少出家以苦行致稱成都宋豐等請為三賢寺主晝夜誦法華經兼習禪定於山中誦法華經有虎來蹲其前誦經竟乃去後每至諷詠輒見左右有四人為侍衛年雖衰老而翹勤彌厲後微疾便語侍者云天童子來迎云汝依誦經力當生兜率期既至吾將去矣死後可為燒身若燒身處生青色華以為驗弟子依遺命為燒其人實如所言衆人流淚異之而已宋剡法華臺釋法宗四釋法宗臨海人少好遊獵嘗於剡遇射孕鹿母墮胎鹿母銜箭猶就地舐子宗乃悔悟知貪生愛子是有識所同於是摧弓折矢出家業道常分衛自資受一食法蔬苦六時以悔先罪誦法華維摩常升臺諷詠響聞四遠士庶稟其歸戒者三千餘人遂開拓所住以為精舍因誦為目號曰法華臺也中時有異光明暗夜如晝人皆異之宗後不測所終臺寺現在若有疾病者止宿於中祈念即愈矣宋京師南㵎寺釋道冏五釋道姓馬扶風人初出家為道懿弟子懿病嘗遣等四人至河南霍山採鐘乳入穴數里跨木渡水三人溺死炬火又亡判無濟理素誦法華唯憑誠此業又存念觀音有頃見一光如螢火追之不及遂得出穴於是進修禪業節行彌新頻作數過普賢齊並有瑞應或見梵僧入坐或見騎馬人至並未及暄涼倏忽不見後與同學四人南遊上京觀矚風化夜乘氷度河中道氷破三人沒死又歸誠觀音誦法華乃覺腳下如有一物自𢼨復見赤光在前乘光至岸達都止南㵎寺常以船舟為業嘗中夜誦經已入禪忽見四人御車至房呼令上乘欻不自覺已見身在郡後沈橋間見一人在路坐胡床侍者數百人見驚起曰坐禪人耳彼人因謂左右曰向上令知處而已何忽勞屈法師於是禮拜執別令人送還寺扣門良久方開入寺見房併閉衆咸莫測其然宋元嘉二十年臨川康王義慶携往廣陵終於彼矣宋廬山釋慧慶六釋慧慶廣陵人也少出家止廬山寺學通經律清潔有戒行誦法華十地等每夜吟諷常聞暗中有彈指讚歎之聲曰汝諷誦法華我等深生喜決定成佛道唯願誦不止嘗於小雷遇風波船將覆沒慶唯誦法華經不輟覺船在浪中如有人牽之倏忽至岸於是篤厲彌勤宋元嘉末卒春秋六十有二異香滿室微細音樂聞於空中人皆謂誦經福力得淨土迎而已宋臨淄釋普明七釋普明姓張臨淄人少出家稟性清純蔬食布衣以懺誦為業誦法華維摩二經及諷誦之時有別衣別座未嘗穢雜每至勸發品輒見普賢乘象立在其前誦維摩經亦聞空中唱樂又善神呪所救皆愈有卿人王道真妻病請明來呪明入門婦便悶絶俄見一物如狸身長數尺許從狗竇出因此而愈明嘗行水傍祠巫覡自云神見之皆奔走八十有五卒宋京師道場寺釋法莊八釋法莊姓申淮南人也十歲出家為廬山慧遠弟子少以苦節標名晚遊關中從睿公稟學元嘉初出都止道場寺性率素止一中而已誦大涅槃法華淨名每後夜諷誦法華比房常聞莊戶前有如兵杖羽衛之響實天神來聽誦經如斯感化非一宋大明初卒七十有六宋京師東瓦官寺釋慧果九釋慧果豫州人少以蔬苦自業宋初遊京師止瓦官寺誦法華十地嘗於圊廁見一鬼致敬於果云昔為衆僧作維那小不如法墮在噉糞鬼中法師德素高明又慈悲為意願助以拔濟之方也又云昔有錢三千埋在柿樹根下願取以為福果即告衆掘取果得三千為造法華一部并設會後夢見此鬼云已得改生大勝昔日果以諷誦力得小通力以宋太始六年卒七十有六齊京師高座寺釋慧進十釋慧進姓姚吳興人也少而雄勇任性遊俠年四十忽悟心自啓遂爾離俗止京師高座寺蔬食素衣誓誦法華用心勞苦執卷輒病乃發願願造法華百部以悔前障始聚得錢一千六百時有賊劫來問進有物不答云唯有造經錢在佛處群賊劫聞之𧹞然而去於是聚集信施得以成經滿足百部經成之後病亦小差誦法華一部得過情願情願既滿厲操愈堅常回諸福業願生安養未亡少時忽聞空中聲曰汝所願已足必得生西方也至齊永明三年無疾而卒八十有五齊永興柏林寺釋弘明十一釋弘明本姓羸會稽山陰人少出家貞苦有戒節止山陰雲門寺誦法華習禪定精勤禮懺六時不輟每旦則水瓶自滿實諸天童子以為給使也明嘗於雲門坐禪及誦經見一小兒來聽明誦經明曰汝是何人答云昔此寺沙彌為盜飲食今墮圊中聞上人道業故來聽誦經願助方便使免斯纍也明即說法勸化領解方隱又虎來入明室內伏于床前見明聞經端然不動久之乃去後於永興石姥巖入定又有山精來惱明明投得以腰繩繫之鬼遜謝求脫云後不敢復來及解放於是絶迹以齊永明中卒齊京師靈根寺釋慧豫十二釋慧豫黃龍人來遊京師止靈根寺少而務學遍訪衆師善談論美風則每聞臧否人物輒塞耳不聽或時以異言聞止瓶衣卛素曰以一中自畢精勤標節以救苦為先誦法華涅槃等又習禪業精於五門嘗寢見有三人來扣戶並衣冠鮮潔執持華蓋豫問覓誰答云法師應死故來奉迎豫曰小事未了可申一年不答云可爾至明年滿一周而卒齊永明七年五十有七齊上定林釋超辨十三釋超辨姓張燉煌人幼而神悟孤發履操深沈誦法華金剛般若聞京師盛於佛法乃越自西河路由巴楚達于建業頃之東適吳越觀矚山水停山陰城傍寺少時後還都止定林上寺間居養素畢命山門誦法華日限一遍心敏口從恆有餘力禮千佛凡一百五十餘萬拜足不出門三十餘載以齊永明十年終於山寺七十有三葬于寺南沙門僧祐為造碑墓所東莧劉協製文齊山陰天柱寺釋法慧十四釋法慧本姓夏侯氏少而秉志精苦律行氷嚴以宋大明之末東遊禹穴隱于天柱山寺誦法華一部蔬食布衣志耽人外居閣不下三十餘年王侯稅駕止拜房而反唯汝南周顒以信解兼深特與相接時有慕德希禮或因顒介意時一見者以齊建武二年卒八十有五齊京師後岡釋僧侯十五釋僧侯姓龔西涼州人年十八便蔬食禮懺及具戒之後遊方勸化宋孝建初來至京師誦法華維摩等常二日一遍如此六十餘年蕭慧開入蜀請共同遊後慧開協同義嘉負罪歸闕侯乃還都於後岡創立石室以為安禪之所自息慈以來至于捨命魚肉葷辛未嘗近齒腳影小蹉輒虛齊而過齊永明元二年微覺不悆至中不能食乃索水漱口合掌而卒八十有九已上十四緣梁高僧傳第十二并內典録第十等魏泰嶽人頭山𮕣草寺釋志湛十六釋志湛齊州山荏人也是朗公曾孫之弟子也立行純厚省事少言仁濟為務每遊諸禽獸而群不為亂住人頭山邃谷中𮕣草寺寺即宋求那跋摩之所立也讀誦法華用為常業將終之日沙門寶志奏梁武曰北方山荏縣人住今𮕣草寺須陀洹果聖僧者今日入涅槃揚都道俗聞志此告皆遙禮拜故湛之亡也寂無餘惱端然氣絶兩手各舒一指有西天竺僧解云若二果者舒兩指驗湛初果也還收葬于人頭山築塔安之石灰泥塗鳥獸不敢陵污今猶在焉續高僧傳第二十八范陽五侯寺僧十七五侯寺僧失其名不知何處人精苦節常誦法華為業更無餘志漸及衰邁卒於其寺初死之時弟子摧殯堤下後遷改葬骸骨並枯惟舌不壞人皆謂之誦法華舌不壞也雍州僧法常十八僧法常一心誦法華不樂人間常遊山林遂隱于白鹿山晝夜常誦感一童子常來供給餅飯等自然而有臨終之時紫雲聳山異香滿山以死骸置巖下經歷多年餘骸枯朽惟舌如故見者隨喜齊并州誦經舌十九齊武成世并州東看山側有人掘地見一處土其色黃白與傍有異尋見一物狀如人兩脣其中有舌鮮紅赤色以事聞奉帝問諸道人無能知者沙門大統法上奏曰此持法華者六根不壞報耳誦滿千遍徵驗乎及敕中書舍人高珍曰卿是信向之人自往看之必有靈異宜遷置淨所設齊供養珍奉敕至彼集諸持法華沙門執爐潔齊繞旋而呪曰菩薩涅槃年代已遠像法流行奉無謬者請現感應才始發聲此之脣舌一時鼓動雖無響及而相似讀誦諸同見者莫不毛竪珍以狀聞詔遣石函藏之遷于山室云唐終南山藍谷悟真寺釋慧超二十釋慧超姓泛氏丹陽建元人稟懷溫裕立性懷仁齡厭俗自出家後誦法華經聞光州大蘇山慧思禪師獨悟一乘善明三觀與天台智者仙城命公篤志幽尋積年請業行優智遠德冠時賢思對衆命曰超之神府得忍人也及遊衡嶺復與同途留誦經停函移歲序自隋初廓定北入嵩高餌藥坐禪冀言終老隋太子勇召集名德總會帝城以超業行不群特留供養而恭慎凝攝不顧世華及勇廢免一無所涉晚移定水高振德音道俗歸宗仰其戒範會淨業法師卜居藍田谷之悟真寺欽超有道躬事邀迎共隱八年倍勤之三慧及大乘承運禪定初基爰發詔書延入行道屢辭砭疾後許還山德感物情頗存汲引四川貴望一縣官民莫不委質投誠請傳香德并為經始伽藍繼綜羞粒大唐伊始榮重於前京邑名僧慧因保恭等情慕隱淪咸就栖止蔭松偃石論詳道義皆曰斯誠出要樂也後外疾少時弟子跪問答曰吾之常也長生不欣夕死不戚乃面西正坐云第一義空清淨智觀言如入定奄遂長往春秋七十有七即武德五年十二月六日也露骸松石一月餘日顏色不變天策上將聞稱希有遣人就視端拱如生自超九歲入道即誦法華五十餘年萬有餘遍感靈獲瑞不可勝言弟子法成等為建白塔于寺之北峯焉百濟國達拏山寺釋慧顯二十一釋慧顯百濟國人也少出家苦心精專以誦法華為業祈福請願所遂者多聞講三論便從聽受法一染神彌增其緒初住本國北部修德寺有衆則講無便清誦四遠聞風造山喧接便往南方達拏山山極深險重隒巖固縱有往展登陟艱危顯靜坐其中專業如故遂終于彼同學輿尸置石窟中虎噉身骨並盡惟餘髏舌存焉經于三周其舌彌紅赤柔軟勝常過後方變紫鞭如石道俗怪而敬焉俱緘閉于石塔時年五十有八即貞觀之初年也唐驪山津梁寺釋善慧二十二釋善慧姓苟氏河內溫人博通群籍統括文義逮于九章律歷七曜盈虛皆吞若胸中抵掌符會乃深惟世務終墜泥塗遂解褐抽簪創歸僧伍初在徐州之彭城寺誦法華經聽收攝論時遭寇蕩兵食交侵而慧抱飢自勵奉法無殆洗穢護淨彌隆恆日但以邊邑寮學文字紕謬至於音詁衆議紛然雖復俗語時通而慧意存雅正周訪明悟還同昔疑乃以大業末齡負錫西入屢逢群盜衣裳略盡但有蔽布自遮猶執破瓶常充淨用既達關口素闕繻文遂即正念直前從門而度于時中表列刃曾無遮止孟冬十月初達京師值沙門吉藏正講法華深副本圖即依聽受形服鄙惡衆不納之乃掃雪藉地單裾襯坐都講財唱傾耳詞句擬定經文藏既闡揚勇心承旨望理通義由情存兩得不暇忍寒歡笑凞如賈獲寶竟冬常爾衆方美之問以詞旨斥無遺忘乃以聞法同屬禪定寺沙門法喜便脫衣迎之引至房中智觀無濫慧又師喜兩振芳規武德初年隨住藍田之津梁寺俗本驪戎互相梗戾率㢡陶化十室而九然而性愛英賢樂相延致自西自東百有餘里名林勝地皆建禪坊所以逃逸之儔賴其安堵以貞觀九年正月終於驪山之陽涼泉精舍春秋四十有九初慧棄擲俗典蒞此玄摸言不重涉專心道業省言節食佩律懷仁迎頓容旅雅重經教於中誦法華不改志其有未曾覿者要必親觀若值行要纍日誦持以為熏習之基也晉大原沙門釋慧達二十三釋慧達者大原人誦法華經五千餘遍行坐威儀其聲不輟偏存物命直視低目地有蟲豸必回身而避不敢跨越有問答曰斯之與吾生死不定將不先成正覺安可妄輕之耶以貞觀八年四月結跏趺坐誦法華而終人謂入定停于五宿既似長逝又不臭腐乃合床內于窟中唐終南山悟真寺釋法誠二十四釋法誠姓樊氏雍州萬年人童小出家止藍田王效寺事沙門僧和和亦卿族所推奉之比聖嘗有人欲害夜往其房見門內猛火騰焰升悵遂即退悔性飲清泉潔清故也人或弄之密以羊骨沈水和素不知飲便嘔吐其冥感潛識為若此矣誠奉佩訓勗誦法華經以為恆任又謁禪林寺相禪師詢于定行而德茂時宗學優衆仰晚住雲華綱理僧鎮隋文欽德請遵戒範乃陳表固辭薄言抗禮遂負笈長驅歷遊名嶽追蹤勝友咸承志道因見超公隱居幽靜乃結心期栖遲藍谷處既局狡才止一床旋轉經行恐顛深壑便剗迹開林披雲附景茅茨葺宇甕牖疏簷情事相依欣然符合今所謂悟真寺也法華三昧翹心奉行澡沐中表溫恭朝夕夢感普賢勸書大教誠曰大教大乘也諸佛智慧所謂般若又手寫法華正當露地因事他行未營收舉屬洪雨滂注溝㵎波飛走往看之而合案並乾餘便流潦嘗却偃橫松遂落懸溜未至下㵎不覺已登高岸無損一毛至貞觀十四年夏末日忽感餘疾自知即世願生兜率索水浴訖又索終輿旁自撿挍不許榮厚恰至月末明相將現無故語曰欲來但入未假弦歌顧侍人曰吾聞諸行無常生滅不住九品往生此言驗矣今有童子相迎久在門外吾今去世爾等佛有正戒無得有虧後致悔也言已口出光明照于楹內又聞異香苾芬而至但見端坐儼思不覺其神已逝時年七十有八然誠之誦習也一夏法華科五百遍餘日讀誦兼而行之猶獲兩遍縱有人容要須與語者非經部度中不他言略計十年之勤萬有餘遍唐京師大莊嚴寺釋慧銓二十五附智證宋公事釋慧銓姓蕭氏今特進宋公瑀之兄子也父仕隋為梁公祖即梁明帝矣性度恢簡志用冲粹姑即隋煬之后也自幼及長恆在宮闕慕樂超世無因自達年既冠成帝乃尚以秦孝王女為妻非其願也事不獲已時行侁儷及妻終後方遂夙心以鄭氏東都預茲剃落及武德初歲方還京輦住莊嚴寺廣聽衆部而以法華攝論為心頗懷篇什尤能草隸隨筆所被用為摸揩故經題寺額咸推仰之又弟智證出家同住誦通法華即宋公之兄太府卿之子也證與兄銓相次而卒以家世信奉偏弘法華同族尊卑咸所成誦故蕭氏法華皂素稱富特進撰疏總集十有餘家採掇菁華揉以胸臆勒成卷數常自敷弘時召京輦名僧指摘瑕纍或集親屬僧尼數將二十給慧以時四事無怠故封祿所及惟存通濟太府情好讀誦為先故生至終誦盈萬遍雇人抄寫總有千部每日朝參必使儐者執經在前至於公事微隙便就轉讀朝伍仰屬以為絶倫自釋化東傳流味彌遠承受讀誦世罕伊人蕭氏一門可為天下摸楷矣已上十緣續高僧傳第二十八宋黃龍沙彌曇無竭二十六宋永初中有黃龍沙彌曇無竭者誦觀世音經淨修苦行與諸徒屬二十五人往尋佛國備經荒險貞志彌堅既達天竺舍衛路逢山象一群竭齎經誦念稱名歸命有師子從林中出象驚奔走後有野牛一群鳴吼而來將欲加害竭又如初歸命有大鷲飛來牛便驚散遂得剋免其誠心所感在險剋濟皆此類也於此一緣嘉祥等師引為觀音品應驗今案僧傳觀世音經者非觀音品是觀世音授記經也為欲令知同異且此中編録之晉蜀石室山釋法緒二十七釋法緒姓混高昌人德行清謹蔬食修禪後入蜀於劉師冢間頭陀山谷虎哭不傷誦法華維摩金光明等常處石室中且禪且誦盛夏於室中捨命七日不臭尸左側有香經旬乃歇每夕放光照徹數里村人即於尸上為起冢塔焉宋山陰法華山釋僧翼二十八釋僧翼本吳興餘抗人少而信悟早有絶塵之操初出家止廬山寺依慧遠修學蔬素苦節見重門人晚適關中復師羅什經律數論並皆參涉又誦法華一部以晉義熙十三年與同志曇學沙門俱遊會稽訪山水至秦望西北見五岫駢峯有耆闍之狀乃結草成菴稱曰法華精舍太守孟顗富人陳載並傾心挹德贊助成功翼蔬食㵎飲三十餘年誦法華功莫大深夜有光明乃是普賢現其人前以宋元嘉二十七年卒春秋七十立碑山寺旌其遺德唐潤州攝山栖霞寺釋智聰二十九釋智聰未詳何許人昔住楊都白馬寺後住止觀寺陳平後度江住揚州安樂寺大業既崩思歸無計隱江萩中誦法華經七日不飢恆有四虎繞之而已不食已來經今十日聰曰吾命須臾卿須可食虎曰造立天地無有此理忽有一翁年可八十腋下挾船曰師欲度江至栖霞住者可即上船四虎一時目中淚出聰曰救危扶難正在今日可迎四虎於是利涉往達南岸船及老人不知所在聰領四虎同往栖霞舍利塔西經行坐禪誓不寢臥衆徒八十咸不出院若有凶事一虎入寺大聲告衆由此驚悟每以常式聰以山林出遠糧粒艱岨乃合卒揚州三百清信以為米祐人別一石年別送之由此山糧供繼道俗乃至禽獸通皆濟給至貞觀二十三年四月八日小食訖往止觀寺禮大師靈像執爐遍禮又往興皇墓所禮拜還歸本房安坐而卒異香充溢丹陽一郭受戒道俗三千餘人奔走山服哀慟林野時年九十九矣隋京師靜法寺釋智嶷三十釋智嶷姓康本康居王胤也國難東歸魏封于襄陽因纍居之十餘世矣七歲初學尋一乘文究竟無師自悟敬重佛宗雖書權俗緣令依學侶而夜私誦法華竟文純熟二親初不知也十三拜辭即蒙剃落更咨大部情因彌著二十有四方受具足嶷住寺多年專心諷誦法華常思定慧非大要事不出戶庭故往參候罕覩其面諷誦入曉更化人現前安慰其人誦及千部千佛共守護若及萬部必生淨國聞是語已歡喜彌勵其志即世七十有餘矣
