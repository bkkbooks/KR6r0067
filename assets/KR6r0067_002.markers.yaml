  - {type: variant, offset: 1344, length: 380, content: 弘始八年夏。天竺沙門三藏法師耆婆鳩摩羅什。秦言童壽。於長安大寺草堂之中。與生肇融叡等八百餘人。四方義學英秀二千餘人。俱再譯斯經。與眾詳究。什自執梵本口譯秦語。姚興自執舊經。以相讎挍定新文。文義俱通。妙理再中矣。興諮什曰。君觀所譯二十八品。文義美明宗體自彰。乍觀護經。以序品稱為光瑞品。藥草喻品末益其半品。化城喻品題往古品。富樓那及法師初。增數紙文。闕略普門偈。囑累還結其終。未測旨歸。其事如何。什曰。善哉明主續法燈長炎。曉暗夜迷景。自非發疑。誰明深旨。勘舊梵文。宛若斯。予昔在天竺國。時遍遊五竺。尋討大乘。從大師須利耶蘇摩。飡稟理味。慇懃付囑梵本言。佛日西入。遺耀將及東北。茲典有緣於東北。汝慎傳弘。昔婆藪槃豆論師。製作優婆提舍。是其正本。莫取捨其句偈。莫取捨其真文。予怱怱忝飡受之。負笈來到。今所傳。良有所以。詮定宗旨。不同異途。呂恐聖旨。待冥可否。夢感遍吉稱可。深會佛旨。具為釋義。興主開朦。義學伏膺。捨舊本翫新文。覆勘再授。今講肆次略記由來。冀通方之後賢。不咎其差違。流行之處。必有感應矣, 甲: 弘始八年夏天竺沙門三藏法師耆婆鳩摩羅什於長安大寺草堂之中與生肇融叡等八百餘人四方義學二千餘人俱出斯經與眾詳究什自手執梵本經曰譯秦語興自手執舊經以相讐校新文異舊義義悉圓通興曰若觀所譯廿八品文義美自乍見舊經藥草品未益其半品富樓那及法師初增數紙文闕略普門偈屬累結其終未測深意什曰善哉明君良續法燈長開悟迷徒勘舊梵本若斯予昔在天竺時湏利耶蘇摩飡受理味摩頂屬累此經言佛曰西隱遺光照東北茲典有緣於東北諸國汝真傳弘昔婆藪槃豆菩薩製論正是斯本莫取捨真文吾恭稟之今所傳詮定宗旨不了有異途一品半二品初古有今無不了間糅屬次神力復亦不可改移普門偈與長行乖違恐聖旨待冥了否夢感普賢稱譽深會佛旨為釋義已開解義學伏膺覆勘重校是以於講次疏以為記冀通方之賢不咎其差研依新以為規摸矣}
